<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>空空如也GameHub 游戏详情</title>
    <link rel="stylesheet" href="./public/site.css?v=20260610-ui-refresh" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar detail-topbar">
        <a class="brand detail-brand" href="./preview.html" aria-label="返回首页">
          <span class="brand-mark">◆</span>
          <span>空空如也GameHub</span>
        </a>
        <div class="detail-topbar-ornament" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </header>

      <section id="detail-root"></section>
      <section class="related-section" id="related-root"></section>
    </main>

    <script src="./public/game-data.js"></script>
    <script>
      const assetVersion = "20260610-ui-refresh";
      const defaultCover = `./public/assets/covers/default-game-cover.jpg?v=${assetVersion}`;
      const legacyPlaceholderCover = "./public/assets/covers/game-placeholder.png";
      const fallbackData = window.GAMEHUB_DATA;
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      const detailRoot = document.getElementById("detail-root");
      const relatedRoot = document.getElementById("related-root");

      function normalizeGame(game) {
        const gameCategories = game.categories || [];
        return {
          title: game.title,
          slug: game.slug,
          category: gameCategories[0]?.slug || game.category_slug,
          categoryName: gameCategories.length
            ? gameCategories.map((category) => category.name).join(" / ")
            : game.category_name || "未分类",
          categories: gameCategories,
          studio: game.studio,
          year: game.release_year,
          rating: Number(game.rating || 0),
          cover: normalizeCover(game.cover_url),
          summary: game.summary,
          details: game.details,
          size: normalizeGameSize(game.size),
          downloadUrl: game.download_url,
          platforms: game.platforms || [],
          tags: game.tags || [],
        };
      }

      function normalizeFallbackGame(game) {
        return {
          ...game,
          categoryName: game.categoryName,
          year: game.year,
          cover: normalizeCover(game.cover),
          size: normalizeGameSize(game.size),
          downloadUrl: game.downloadUrl,
        };
      }

      function normalizeCover(cover) {
        const coverUrl = String(cover || "").trim();
        if (
          !coverUrl ||
          coverUrl === legacyPlaceholderCover ||
          coverUrl === "/public/assets/covers/game-placeholder.png"
        ) {
          return defaultCover;
        }
        if (coverUrl.startsWith("/public/")) {
          return `.${coverUrl}`;
        }
        if (coverUrl.startsWith("public/")) {
          return `./${coverUrl}`;
        }
        if (coverUrl.startsWith("pic/")) {
          return window.location.protocol === "file:" ? `../data/${coverUrl}` : coverUrl;
        }
        return coverUrl;
      }

      function fallbackCoverAttribute() {
        return `onerror="this.onerror=null;this.src='${defaultCover}'"`;
      }

      function normalizeGameSize(value = "") {
        const size = String(value).trim();
        return size && size !== "未知" && size !== "未知大小" && size !== "未标注"
          ? size
          : "";
      }

      function escapeHtml(value = "") {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderDownloadAddress(downloadUrl) {
        const url = String(downloadUrl || "").trim();
        if (!url) {
          return `
            <div class="download-address">
              <span class="download-address-label">下载地址</span>
              <span class="muted">暂无下载地址</span>
            </div>
          `;
        }

        const safeUrl = escapeHtml(url);
        return `
          <div class="download-address">
            <span class="download-address-label">下载地址</span>
            <span class="detail-download-link">${safeUrl}</span>
          </div>
        `;
      }

      function getGameDescription(game) {
        return String(game.summary || game.details || "暂无游戏详情。").trim();
      }

      function renderCategoryTags(categoryName) {
        return String(categoryName || "未分类")
          .split("/")
          .map((name) => name.trim())
          .filter(Boolean)
          .map((name) => `<span>${escapeHtml(name)}</span>`)
          .join("");
      }

      async function requestGame() {
        const response = await fetch(`/api/games/${encodeURIComponent(slug)}`);
        if (!response.ok) {
          throw new Error("Game not found");
        }
        return normalizeGame(await response.json());
      }

      function renderNotFound() {
        detailRoot.innerHTML = `
          <div class="panel">
            <h1>未找到游戏</h1>
            <p class="muted">请返回游戏库重新选择。</p>
            <a class="button primary" href="./preview.html">返回游戏库</a>
          </div>
        `;
      }

      function renderGame(game) {
        document.title = `${game.title} - 空空如也GameHub 游戏详情`;
        const safeDownloadUrl = escapeHtml(game.downloadUrl || "");
        const safeTitle = escapeHtml(game.title);
        const safeDetails = escapeHtml(getGameDescription(game));
        const safeYear = game.year ? escapeHtml(game.year) : "未标注";
        const safeSize = escapeHtml(game.size || "未标注");
        const safePlatforms = escapeHtml(game.platforms.join(" / ") || "PC");
        const categoryTags = renderCategoryTags(game.categoryName);
        detailRoot.innerHTML = `
          <article class="detail-layout">
            <div class="detail-cover">
              <img src="${game.cover}" alt="${safeTitle} 封面" ${fallbackCoverAttribute()} />
            </div>
            <div class="detail-panel detail-copy">
              <h1>${safeTitle}</h1>
              <div class="detail-main-content">
                <p class="detail-description">${safeDetails}</p>
                <section class="detail-info-section">
                  <span class="detail-info-label">类型</span>
                  <div class="detail-type-list">${categoryTags}</div>
                </section>
                <div class="detail-stat-grid">
                  <div class="detail-stat"><span>年份</span><strong>${safeYear}</strong></div>
                  <div class="detail-stat"><span>平台</span><strong>${safePlatforms}</strong></div>
                  <div class="detail-stat"><span>大小</span><strong>${safeSize}</strong></div>
                </div>
                ${renderDownloadAddress(game.downloadUrl)}
              </div>
              <div class="detail-download-actions">
                <div class="meta-row">
                  ${game.downloadUrl ? `<a class="button primary" href="${safeDownloadUrl}" target="_blank" rel="noreferrer">前往下载</a>` : ""}
                </div>
              </div>
            </div>
          </article>
        `;
      }

      function renderRelated(game) {
        const relatedGames = fallbackData.games
          .map(normalizeFallbackGame)
          .filter((item) => item.slug !== game.slug && gameSharesCategory(item, game))
          .slice(0, 3);
        if (relatedGames.length) {
          relatedRoot.innerHTML = `
            <h2>同分类推荐</h2>
            <div class="related-grid">
              ${relatedGames.map(renderRelatedCard).join("")}
            </div>
          `;
        } else {
          relatedRoot.innerHTML = "";
        }
      }

      function renderRelatedCard(item) {
        const safeTitle = escapeHtml(item.title);
        const safeCategoryName = escapeHtml(item.categoryName);
        const safeCover = escapeHtml(item.cover);
        const safeYear = item.year ? escapeHtml(item.year) : "未标注";
        const safeSize = item.size ? escapeHtml(item.size) : "未标注";
        const safePlatforms = escapeHtml(item.platforms.join(" / ") || "PC");

        return `
          <a class="related-card" href="./detail.html?slug=${encodeURIComponent(item.slug)}">
            <img src="${safeCover}" alt="${safeTitle} 封面" ${fallbackCoverAttribute()} />
            <div class="related-card-body">
              <span class="eyebrow">${safeCategoryName}</span>
              <strong class="related-card-title">${safeTitle}</strong>
              <div class="detail-stat-grid related-stat-grid">
                <div class="detail-stat"><span>年份</span><strong>${safeYear}</strong></div>
                <div class="detail-stat"><span>平台</span><strong>${safePlatforms}</strong></div>
                <div class="detail-stat"><span>大小</span><strong>${safeSize}</strong></div>
              </div>
            </div>
          </a>
        `;
      }

      function gameSharesCategory(item, game) {
        const gameCategories = new Set(
          game.categories.flatMap((category) => [category.slug, category.name]),
        );
        return item.categories.some(
          (category) => gameCategories.has(category.slug) || gameCategories.has(category.name),
        );
      }

      async function loadDetail() {
        if (!slug) {
          renderNotFound();
          return;
        }

        try {
          const game = await requestGame();
          renderGame(game);
          renderRelated(game);
        } catch {
          const fallbackGame = fallbackData.games
            .map(normalizeFallbackGame)
            .find((item) => item.slug === slug);
          if (!fallbackGame) {
            renderNotFound();
            return;
          }
          renderGame(fallbackGame);
          renderRelated(fallbackGame);
        }
      }

      loadDetail();
    </script>
  </body>
</html>
